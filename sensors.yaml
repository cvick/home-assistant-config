# Sensor Templates

# seedbox rtorrent

  - platform: rtorrent
    url: !secret rtorrent_url
    monitored_variables:
#      - 'current_status'
      - 'download_speed'
      - 'upload_speed'

  - platform: command_line
    command: cal $(date +"%m %Y") | awk 'NF {DAYS = $NF}; END {print DAYS}'
    name: Days In Current Month
    scan_interval: 3600

# OhmConnect
  - platform: ohmconnect
    id: !secret ohmconnect_id
    
# ADSB
  - platform: rest
    name: FR24 Aircraft
    resource: http://10.0.0.92:1090/data/aircraft.json
    value_template: "{{ value_json.messages }}"
    method: GET
    scan_interval: 15
    json_attributes:
      - now
      - aircraft
