homeassistant:
  # Name of the location where Home Assistant is running
  name: Home

  # Location required to calculate the time the sun rises and sets
  latitude: !secret latitude
  longitude: !secret longitude

  # Impacts weather/sunrise data (altitude above sea level in meters)
  elevation: !secret elevation

  # metric for Metric, imperial for Imperial
  unit_system: imperial

  # Pick yours from here: http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  time_zone: !secret time_zone

  # Customization file
  customize: !include customize.yaml
  customize_glob: !include customize_glob.yaml

# Use Postgres for logging
recorder: !include recorder-postgres.yaml

# Log Viewer add on
logger:
  default: warning
#  logs:
#    homeassistant.components.homekit: debug
#    pyhap: debug
#    homeassistant.components.alexa: debug

# Enables the frontend
frontend:
  themes: !include_dir_merge_named themes
  #extra_module_url:
  # - /hacsfiles/lovelace-card-mod/card-mod.js

# Enables configuration UI
config:

# Enables my.home-assistant.io integreation
my:

# Enable Energy Dashboard
energy:

# HACS plug-in - remote syslog
remote_syslog:

# shell_command
shell_command: !include shell_command.yaml

# Uncomment this if you are using SSL/TLS, running in Docker container, etc.
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 10.0.0.85
    - 10.253.0.50
    - 10.0.0.80
  login_attempts_threshold: 3
  ip_ban_enabled: false

# Enable API
api:

# Allows you to issue voice commands from the frontend in enabled browsers
conversation:

# Enables support for tracking state changes over time
history:

# View all events in a logbook
logbook:

# Track the sun
sun:

# iOS Component
ios:

# Enable Alexa through haaska
alexa: !include alexa.yaml

# HomeKit:
homekit: !include homekit.yaml

# Enables emulated-hue so Alexa can control devices
## Devices are not included automatically for more control
## To add a device, add emulated_hue: true to the entity in customize.yaml
emulated_hue:
  expose_by_default: false

# Cameras
camera: !include cameras.yaml

# Sensors
sensor: !include sensors.yaml

# Switches
switch: !include switches.yaml

# Enable tracking system health statistics
system_health:

# Enable mobile app component
mobile_app:

# Enable HA Alerts
homeassistant_alerts:

# Enable image upload
image_upload:

# Enable USB device hotplug detection
usb:

# Groups
group: !include groups.yaml

# Automations
automation: !include automations.yaml

# Scripts
script: !include scripts.yaml

# Scenes
scene: !include scenes.yaml

# Templates
template: !include templates.yaml

# Custom Devices

## Wemo Plugs
wemo: !include wemo.yaml

# Files
file: !include files.yaml

# Local Files
# local_file: !include local_file.yaml
